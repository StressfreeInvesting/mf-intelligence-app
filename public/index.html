var sb=Object.keys(ba).map(function(s){return{stock:s,sec:ba[s].sec,fc:ba[s].funds.length,funds:ba[s].funds,td:ba[s].td.toFixed(2)}}).sort(function(a,b){return b.fc-a.fc});

function computeMF(){var sc={};SM.mh.forEach(function(s){sc[s.stock]={sec:s.sec,ms:0,sig:[],hc:s.hc,fc:s.fc,tv:s.tv,funds:s.funds}});
var ebs={};SM.fe.forEach(function(e){if(!ebs[e.stock])ebs[e.stock]={hs:new Set(),fs:[]};ebs[e.stock].hs.add(e.house);ebs[e.stock].fs.push(e.fund)});
Object.keys(ebs).forEach(function(s){if(!sc[s])sc[s]={sec:"",ms:0,sig:[],hc:0,fc:0,tv:0,funds:[]};var e=ebs[s];if(e.hs.size>=3){sc[s].ms+=2.0;sc[s].sig.push("+2.00 Entry by "+e.hs.size+" houses")}else if(e.hs.size>=2){sc[s].ms+=1.5;sc[s].sig.push("+1.50 Entry by 2 houses")}else{sc[s].ms+=0.75;sc[s].sig.push("+0.75 New position")}});
SM.sb.forEach(function(s){if(!sc[s.stock])return;if(s.fc>=3){sc[s.stock].ms+=1.0;sc[s.stock].sig.push("+1.00 "+s.fc+" funds accumulating")}else if(s.fc>=2){sc[s.stock].ms+=0.5;sc[s.stock].sig.push("+0.50 "+s.fc+" funds buying")}});
var ts=SM.sf.filter(function(s){return s.diff>0}).slice(0,3).map(function(s){return s.sec});
Object.keys(sc).forEach(function(s){if(ts.indexOf(sc[s].sec)>=0){sc[s].ms+=0.75;sc[s].sig.push("+0.75 "+sc[s].sec+" hot sector")}});
Object.keys(sc).forEach(function(s){if(sc[s].hc>=6){sc[s].ms+=0.50;sc[s].sig.push("+0.50 Held "+sc[s].hc+" houses")}else if(sc[s].hc>=4){sc[s].ms+=0.25;sc[s].sig.push("+0.25 Consensus")}});
var exs={};SM.ex.forEach(function(e){exs[e.stock]=(exs[e.stock]||0)+1});
Object.keys(exs).forEach(function(s){if(sc[s]){sc[s].ms-=0.5;sc[s].sig.push("-0.50 Exit")}});
return Object.keys(sc).map(function(s){var o=sc[s];return{stock:s,sec:o.sec,ms:Math.round(o.ms*100)/100,sig:o.sig,hc:o.hc,fc:o.fc,tv:o.tv,funds:o.funds}}).filter(function(s){return s.ms>0}).sort(function(a,b){return b.ms-a.ms})}

    if(sortBy==="mf")return b.ms-a.ms;if(sortBy==="fno")return b.fs-a.fs;

window.doPaperBuy=function(stock,sec,source){
  var price=getPrice(stock);
  if(!price){var p2=prompt("Entry price for "+stock+":");if(!p2)return;price=parseFloat(p2);if(isNaN(price))return;}
  // Auto target & SL based on volatility
  var fno=getFnoForStock(stock);var vol=fno?parseFloat(fno.vol):25;
  var targetPct=Math.max(5,Math.min(15,vol*0.4));var slPct=Math.max(3,Math.min(8,vol*0.2));
  var target=Math.round(price*(1+targetPct/100)*100)/100;
  var sl=Math.round(price*(1-slPct/100)*100)/100;
  var conf=confirm(stock+" @ \u20b9"+price.toFixed(0)+"\nTarget: \u20b9"+target.toFixed(0)+" (+"+targetPct.toFixed(1)+"%)\nSL: \u20b9"+sl.toFixed(0)+" (-"+slPct.toFixed(1)+"%)\n\nConfirm paper buy?");
  if(!conf)return;
  addTrade(stock,sec,price,target,sl,source);
  Z.tab="trade";R();
};
