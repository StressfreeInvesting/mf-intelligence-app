name: Smart Money Daily Fetch V10

# Runs at 7:00 PM IST (13:30 UTC) Mon–Fri after market close.
# Also manually triggerable — useful if you upload your own CSV instead.
#
# REQUIRED SECRETS (set in app repo → Settings → Secrets → Actions):
#   DATA_REPO_PAT       — GitHub PAT with contents:write on the data repo
#
# OPTIONAL SECRETS (for new V10 features):
#   SENDGRID_API_KEY    — SendGrid API key for weekly digest email (#12)
#   DIGEST_EMAIL_TO     — recipient email address for weekly digest
#   DIGEST_EMAIL_FROM   — sender email address (must be verified in SendGrid)
#
# REQUIRED VARS:
#   GITHUB_OWNER    — your GitHub username
#   GITHUB_REPO     — data repo name (default: mf-intelligence-data)

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 7:00 PM IST Mon–Fri (after market close)
  push:
    paths:
      - 'data/uploads/FOVOLT_*.csv'
      - 'data/uploads/fii-dii_*.csv'
      - 'data/uploads/fii-dii-*.csv'
      - 'data/uploads/FIIDII_*.csv'
      - 'data/uploads/fiidii_*.csv'
      - 'data/uploads/sec_bhavdata_full_*.csv'
      - 'data/uploads/sec_bhavdata_*.csv'
      - 'data/uploads/cm_bhav_*.csv'
    # Any CSV pushed to data/uploads/ auto-triggers the pipeline immediately.
    # No need to manually run the workflow after uploading files.
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date to fetch (DD-Mon-YYYY e.g. 10-Apr-2026). Leave blank for today.'
        required: false
        default: ''
      skip_nse_fetch:
        description: 'Skip NSE fetch — just recompute from existing CSV if uploaded manually'
        required: false
        default: 'false'
      force_weekly_digest:
        description: 'Force send weekly digest email even if not Friday'
        required: false
        default: 'false'

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mf-intelligence-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      # ── Process manually uploaded CSVs (FOVOLT + FII-DII) ───────────────────
      # Upload files to data/uploads/ in the data repo before triggering workflow.
      # File naming:
      # FILES STAY IN uploads/ PERMANENTLY — never moved or deleted.
      # Every workflow run re-reads ALL CSVs in uploads/ to rebuild the
      # complete fiiDiiHistory from scratch. No processed/ folder needed.
      #
      # Accepted filenames:
      #   FOVOLT:  FOVOLT_DDMMYYYY.csv          (NSE F&O Volatility download)
      #            BhavCopy_NSE_FO_*.csv         (new NSE BhavCopy format)
      #   FII-DII: fii-dii_DDMMYYYY.csv         (NSE download — underscore)
      #            fii-dii-DDMMYYYY.csv          (hyphen variant)
      #            FIIDII_DDMMYYYY.csv / fiidii_DDMMYYYY.csv
      #
      # Multiple files per type are fine — newest FOVOLT used for signals,
      # ALL fii-dii files used to build the full chart history.
      # If valid uploads are found, NSE auto-fetch is skipped automatically.
      - name: Process manual CSV uploads (FOVOLT + FIIDII)
        id: process_uploads
        run: |
          python3 << 'PYEOF'
          import csv, io, glob, os, json, math
          from datetime import datetime, date, timedelta

          uploads_dir = 'data-repo/data/uploads'
          # NOTE: We intentionally do NOT move or delete files from uploads/.
          # All CSVs stay here permanently as the source of truth.
          # fiiDiiHistory is rebuilt from all fii-dii CSVs on every run.

          INDEX_SYMS = {'NIFTY','BANKNIFTY','SENSEX','FINNIFTY','NIFTYNXT50',
                        'MIDCPNIFTY','BANKEX','SX40','SENSEX50'}

          # ── Find ALL FOVOLT and FII-DII files in uploads/ ────────
          # FOVOLT filename:  FOVOLT_DDMMYYYY.csv
          # FII-DII filename accepted patterns (ALL of these work):
          #   fii-dii_DDMMYYYY.csv   — NSE standard (underscore after 'dii')
          #   fii-dii-DDMMYYYY.csv   — hyphen variant (hyphen after 'dii')
          #   FIIDII_DDMMYYYY.csv    — uppercase variant
          #   fiidii_DDMMYYYY.csv    — lowercase variant
          # Date validation: filenames with future dates are flagged as typos
          fovolt_files = sorted(glob.glob(f'{uploads_dir}/FOVOLT_*.csv'))
          # F&O BhavCopy (new NSE format): BhavCopy_NSE_FO_*.csv
          # Contains: spot close, futures close, OI, OI change, volume per symbol
          bhavcopy_files = sorted(glob.glob(f'{uploads_dir}/BhavCopy_NSE_FO_*.csv'))
          fiidii_files = sorted(set(
              glob.glob(f'{uploads_dir}/fii-dii_*.csv') +
              glob.glob(f'{uploads_dir}/fii-dii-*.csv') +
              glob.glob(f'{uploads_dir}/FIIDII_*.csv')  +
              glob.glob(f'{uploads_dir}/fiidii_*.csv')
          ))
          # CM (equity) Bhavcopy with delivery — sec_bhavdata_full_DDMMYYYY.csv
          # Contains: SYMBOL, TTL_TRD_QNTY, DELIV_QTY, DELIV_PER → delivery %
          # Download: https://archives.nseindia.com → Capital Market → Bhavcopy with Delivery
          cm_bhav_files = sorted(set(
              glob.glob(f'{uploads_dir}/sec_bhavdata_full_*.csv') +
              glob.glob(f'{uploads_dir}/sec_bhavdata_*.csv') +
              glob.glob(f'{uploads_dir}/cm_bhav_*.csv') +
              glob.glob(f'{uploads_dir}/bhav_cm_*.csv')
          ))

          has_fovolt   = bool(fovolt_files or bhavcopy_files)
          has_fiidii   = bool(fiidii_files)
          has_cm_bhav  = bool(cm_bhav_files)

          if not has_fovolt and not has_fiidii:
              print("No CSVs in uploads/ — NSE auto-fetch will run.")
              with open('/tmp/upload_processed.env', 'w') as f:
                  f.write('UPLOADS_FOUND=false\n')
              raise SystemExit(0)

          print(f"Found: {len(fovolt_files)} FOVOLT, {len(bhavcopy_files)} BhavCopy, {len(fiidii_files)} FII-DII files")

          signals     = {}
          fii_dii_raw = {}
          fiidii_rows = []   # per-day rows for fiiDiiHistory chart
          stock_count = 0

          # ── Parse FOVOLT CSV ──────────────────────────────────────
          if fovolt_files:
              # Use newest FOVOLT for signals (all files stay in uploads/)
              fovolt_path = fovolt_files[-1]   # newest — used for signals
              print(f"Processing FOVOLT: {os.path.basename(fovolt_path)}")
              with open(fovolt_path, newline='', encoding='utf-8-sig') as fh:
                  content = fh.read()
              reader = csv.reader(io.StringIO(content))
              raw_header = next(reader, None)
              print(f"  FOVOLT header: {raw_header[:9] if raw_header else 'EMPTY'}")

              # FOVOLT column layout (0-indexed, letter = Excel column):
              #   B=1  Symbol
              #   C=2  Underlying Value (A)  → cl        (spot close today)
              #   D=3  Underlying Value (B)  → pr        (spot close prev day)
              #   E=4  Log Returns
              #   F=5  Previous Day Volatility            → prevVol  ← NEW
              #   G=6  Current Day Daily Volatility       → curVol   ← NEW
              #   H=7  Annualised Volatility              → vol
              #   I=8  Futures Price (today near-month)   → futCl    ← stored explicitly
              #   J=9  Futures Price (prev day)           → prevFutCl← NEW
              hdr_lower = [str(h).lower().replace(' ','').replace('_','') for h in (raw_header or [])]
              def _col(candidates, default):
                  for c in candidates:
                      for i, h in enumerate(hdr_lower):
                          if c in h: return i
                  return default

              col_sym     = _col(['symbol','sym'], 1)
              col_cl      = _col(['underlyingvalue(a)','underlynga','undrlygval(a)','underlyingvaluea'], 2)
              col_pr      = _col(['underlyingvalue(b)','underlyingb','undrlygval(b)','underlyingvalueb'], 3)
              col_logr    = _col(['logreturn','logret','logreturns'], 4)
              col_prevvol    = _col(['previousdayunderlyingvolatility(d)','previousdayvolatility','prevdayvol','prevvol'], 5)
              col_curvol     = _col(['currentdayunderlyingdailyvolatility(e)','currentdaydailyvolatility','currentdayvol','dailyvolatility'], 6)
              col_vol        = _col(['underlyingannualisedvolatility(f)','annualisedvolatility','annualizedvolatility','annvol'], 7)
              col_fut        = _col(['futurescloseprice(g)','futuresprice(g)','futurespriceg','futuresprice','futprice'], 8)
              col_prevfut    = _col(['futurespreviousdaycloseprice(h)','futuresprice(h)','futurespriceh','previousfuturesprice','prevfutprice'], 9)
              col_futlogr    = _col(['futureslogreturns(i)','futureslogreturn','futlogret','futlogreturns'], 10)          # K
              col_prevfutvol = _col(['previousdayfuturesvolatility(j)','previousdayfuturesvolatility','prevdayfutvol','prevfutvol'], 11)  # L
              col_curfutvol  = _col(['currentdayfuturesdailyvolatility(k)','currentdayfuturesvolatility','currentdayfutvol','curfutvol'], 12) # M
              col_futannvol  = _col(['futuresannualisedvolatility(l)','futuresannualisedvolatility','futannvol'], 13)     # N
              col_appannvol  = _col(['applicableannualisedvolatility(n)','applicableannualisedvolatility','appannvol'], 15)  # O (index 15)
              print(f"  FOVOLT col map: cl={col_cl} pr={col_pr} logr={col_logr} vol={col_vol} fut={col_fut} prevFut={col_prevfut} futLogR={col_futlogr} futAnnVol={col_futannvol} appAnnVol={col_appannvol}")

              for row in reader:
                  try:
                      if len(row) < 9: continue
                      sym = row[col_sym].strip().upper()
                      if not sym or sym in INDEX_SYMS: continue

                      def _f(v):
                          try: return float(str(v).replace(',','').strip())
                          except: return None

                      cl           = _f(row[col_cl])                                          # C
                      pr           = _f(row[col_pr])                                          # D
                      log_ret      = _f(row[col_logr])                                        # E
                      prev_vol     = _f(row[col_prevvol])                                     # F
                      cur_vol      = _f(row[col_curvol])                                      # G
                      vol_ann      = _f(row[col_vol])                                         # H: spot annualised vol
                      fut_cl       = _f(row[col_fut])                                         # I
                      prev_fut_cl  = _f(row[col_prevfut])  if len(row)>col_prevfut  else None # J
                      fut_log_ret  = _f(row[col_futlogr])  if len(row)>col_futlogr  else None # K: fut log return
                      prev_fut_vol = _f(row[col_prevfutvol])if len(row)>col_prevfutvol else None # L: prev fut daily vol
                      cur_fut_vol  = _f(row[col_curfutvol]) if len(row)>col_curfutvol  else None # M: cur fut daily vol
                      fut_ann_vol  = _f(row[col_futannvol]) if len(row)>col_futannvol  else None # N: fut annualised vol
                      app_ann_vol  = _f(row[col_appannvol]) if len(row)>col_appannvol  else None # O: applicable annualised vol

                      if cl is None or cl == 0: continue

                      # Spot 1-day return — prefer log return (exact), fallback simple %
                      try:
                          d1 = round((math.exp(log_ret) - 1) * 100, 2) if log_ret else                                (round(((cl - pr) / pr * 100), 2) if pr else 0.0)
                      except: d1 = 0.0

                      # Futures 1-day return — prefer log return, fallback simple %
                      try:
                          fut_d1 = round((math.exp(fut_log_ret) - 1) * 100, 2) if fut_log_ret else                                    (round(((fut_cl - prev_fut_cl) / prev_fut_cl * 100), 2) if (fut_cl and prev_fut_cl and prev_fut_cl > 0) else None)
                      except: fut_d1 = None

                      try:
                          prem = round((fut_cl - cl) / cl * 100, 3) if fut_cl and cl else 0.0
                      except: prem = 0.0

                      vol           = round(vol_ann,    1) if vol_ann    else 0.0
                      pv            = round(prev_vol,   4) if prev_vol   else None
                      cv            = round(cur_vol,    4) if cur_vol    else None
                      pv_fut        = round(prev_fut_vol,4) if prev_fut_vol else None
                      cv_fut        = round(cur_fut_vol, 4) if cur_fut_vol  else None
                      vol_delta     = round(cv - pv,           4) if (cv is not None and pv is not None)             else None
                      fut_vol_delta = round(cv_fut - pv_fut,   4) if (cv_fut is not None and pv_fut is not None)     else None

                      raw   = (d1 / 3.0) + (prem * 0.5)
                      score = round(max(-5.0, min(5.0, raw)), 2)
                      label = ('Strong Bullish' if score >= 3   else
                               'Bullish'        if score >= 1.5 else
                               'Mild Bullish'   if score >= 0.5 else
                               'Strong Bearish' if score <= -3  else
                               'Bearish'        if score <= -1.5 else
                               'Mild Bearish'   if score <= -0.5 else 'Neutral')

                      signals[sym] = {
                          'score': score, 'label': label,
                          'cl': cl,   'pr': pr,   'd1': str(d1),   'd2': str(d1),
                          'futCl': fut_cl,         'prevFutCl': prev_fut_cl,
                          'futD1': fut_d1,          # K derived — futures 1-day return %
                          'prevVol': pv,            'curVol': cv,     'volDelta': vol_delta,
                          'prevFutVol': pv_fut,     'curFutVol': cv_fut, 'futVolDelta': fut_vol_delta,
                          'spotAnnVol': vol_ann,    # H
                          'futAnnVol':  fut_ann_vol, # N
                          'appAnnVol':  app_ann_vol, # O ← KEY: used by calcTargetSL and F3 scoring
                          'prem': str(prem), 'vol': str(vol)
                      }
                      stock_count += 1
                  except: continue

              print(f"  Parsed {stock_count} stocks from FOVOLT")
              for chk in ['SUNPHARMA','RELIANCE','HDFCBANK']:
                  if chk in signals:
                      s = signals[chk]
                      print(f"  CHECK {chk}: cl={s['cl']}  prem={s['prem']}  d1={s['d1']}")

              # Store basename BEFORE archiving (used later for date extraction)
              fovolt_basename = os.path.basename(fovolt_path)
              print(f"  FOVOLT processed: {fovolt_basename} (stays in uploads/)")

          # ── Parse NEW NSE BhavCopy format: BhavCopy_NSE_FO_*.csv ──────────
          # Format: TckrSymb,TradDt,FinInstrmNm,OptnTp,StrkPric,UndrlygPric,...
          # We use UndrlygPric as the spot close (this is the correct field).
          # TradDt (YYYY-MM-DD) is used as the authoritative trading date.
          bhavcopy_date_iso = None
          if bhavcopy_files:
              bhavcopy_path = bhavcopy_files[-1]   # newest
              print(f"Processing BhavCopy: {os.path.basename(bhavcopy_path)}")
              with open(bhavcopy_path, newline='', encoding='utf-8-sig') as fh:
                  content = fh.read()
              reader = csv.DictReader(io.StringIO(content))
              bhav_header = reader.fieldnames or []
              print(f"  BhavCopy header: {bhav_header[:10]}")

              # Normalise header keys
              def _norm(k): return str(k).strip().replace(' ','').replace('_','').lower()
              bhav_header_norm = {_norm(h): h for h in bhav_header}

              def _bfld(*names):
                  for n in names:
                      if n in bhav_header_norm: return bhav_header_norm[n]
                  return None

              fld_sym   = _bfld('tckrsymb','symbol','sym')
              fld_dt    = _bfld('traddt','tradingdate','trddt','bizdt','date')
              fld_undrl = _bfld('undrlygpric','underlyingprice','underlyingvalue','undrlygvl','spotclose')
              fld_close = _bfld('closepric','closingprice','close','settlpric')
              fld_inst  = _bfld('fininstrmn','instrumenttype','instrmntype','instrmtype','type')

              print(f"  BhavCopy fields: sym={fld_sym} dt={fld_dt} undrl={fld_undrl} close={fld_close} inst={fld_inst}")

              bhav_signals_raw = {}  # sym -> {cl, dates seen}
              for row in reader:
                  try:
                      if not fld_sym: continue
                      sym = str(row.get(fld_sym,'')).strip().upper()
                      if not sym or sym in INDEX_SYMS: continue

                      # Only process FUTSTK rows (futures on stocks) — skip OPTSTK/FUTIDX etc
                      if fld_inst:
                          inst = str(row.get(fld_inst,'')).strip().upper()
                          if inst not in ('FUTSTK',): continue

                      def _bf(field):
                          if not field: return None
                          try: return float(str(row.get(field,'')).replace(',','').strip() or '0') or None
                          except: return None

                      # UndrlygPric is the canonical spot price in the new bhavcopy format
                      spot_cl = _bf(fld_undrl)
                      # TradDt for the authoritative trading date
                      if fld_dt and not bhavcopy_date_iso:
                          raw_dt = str(row.get(fld_dt,'')).strip()
                          for fmt in ('%Y-%m-%d','%d-%b-%Y','%d/%m/%Y','%d-%m-%Y','%Y%m%d'):
                              try:
                                  from datetime import datetime as _dtp
                                  bhavcopy_date_iso = _dtp.strptime(raw_dt, fmt).strftime('%Y-%m-%d')
                                  break
                              except: continue

                      if not spot_cl or spot_cl <= 0: continue

                      # Accumulate by sym — keep only the first FUTSTK row (near-month)
                      if sym not in bhav_signals_raw:
                          bhav_signals_raw[sym] = spot_cl
                  except: continue

              print(f"  Parsed {len(bhav_signals_raw)} stocks from BhavCopy (UndrlygPric)")
              print(f"  BhavCopy TradDt: {bhavcopy_date_iso}")

              # Merge into signals dict — BhavCopy spot close updates/overrides cl
              # If a symbol was already parsed from FOVOLT, update only the cl field.
              # If it's new, create a minimal signal entry.
              bhav_added = 0
              for sym, spot_cl in bhav_signals_raw.items():
                  if sym in signals:
                      old_cl = signals[sym]['cl']
                      signals[sym]['cl'] = spot_cl
                      # Recalculate prem with updated spot
                      try:
                          fut = signals[sym].get('fut_cl_raw')
                          prem = round((fut - spot_cl) / spot_cl * 100, 3) if fut else 0.0
                          signals[sym]['prem'] = str(prem)
                      except: pass
                      if abs(old_cl - spot_cl) > 1:
                          print(f"  UPDATED {sym}: cl {old_cl} → {spot_cl} (BhavCopy)")
                  else:
                      # New symbol only in bhavcopy — minimal entry, no score data
                      signals[sym] = {
                          'score': 0.0, 'label': 'Neutral',
                          'cl': spot_cl, 'pr': spot_cl,
                          'd1': '0', 'd2': '0', 'prem': '0', 'vol': '0'
                      }
                      bhav_added += 1
              stock_count = len(signals)
              print(f"  BhavCopy merge done — {bhav_added} new symbols added, total={stock_count}")
              for chk in ['SUNPHARMA','RELIANCE','HDFCBANK']:
                  if chk in signals:
                      s = signals[chk]
                      print(f"  FINAL {chk}: cl={s['cl']}")

              # Archive
              bhavcopy_basename = os.path.basename(bhavcopy_path)
              print(f"  BhavCopy processed: {bhavcopy_basename} (stays in uploads/)")

              # ── Extract OI from BhavCopy_NSE_FO (OpnIntrst + ChngInOpnIntrst) ──
              # Near-month STF (stock futures) rows only — first expiry per symbol
              oi_data = {}  # sym -> {oi, oiChg, vol}
              try:
                  with open(bhavcopy_path, newline="", encoding="utf-8-sig") as fhoi:
                      _oi_reader = csv.DictReader(fhoi)
                      _stf_rows = sorted(
                          (r for r in _oi_reader if r.get("FinInstrmTp","").strip()=="STF"),
                          key=lambda r: r.get("XpryDt","9999")
                      )
                      _seen_oi = set()
                      for _r in _stf_rows:
                          _sym = _r.get("TckrSymb","").strip().upper()
                          if not _sym or _sym in INDEX_SYMS or _sym in _seen_oi: continue
                          _seen_oi.add(_sym)
                          def _foi(v):
                              try: return float(str(v).replace(",","").strip())
                              except: return None
                          _oi    = _foi(_r.get("OpnIntrst",""))
                          _oiChg = _foi(_r.get("ChngInOpnIntrst",""))
                          _vol   = _foi(_r.get("TtlTradgVol",""))
                          if _oi is not None:
                              oi_data[_sym] = {"oi": _oi, "oiChg": _oiChg, "vol": _vol}
              except Exception as _oe:
                  print(f"  OI parse error: {_oe}")
              for _sym, _od in oi_data.items():
                  if _sym in signals:
                      signals[_sym]["oi"]    = _od["oi"]
                      signals[_sym]["oiChg"] = _od["oiChg"]
                      if _od["vol"] is not None: signals[_sym]["oiVol"] = _od["vol"]
              print(f"  OI injected for {len(oi_data)} stocks")
              if "SUNPHARMA" in oi_data:
                  _s = oi_data["SUNPHARMA"]
                  print(f"  SUNPHARMA OI: {_s['oi']:.0f}  oiChg: {_s['oiChg']}")


          # ── Parse FII-DII CSV ─────────────────────────────────────
          # Real NSE FII-DII download format (fii-dii_DDMMYYYY.csv):
          #   Headers contain embedded newlines inside quotes — e.g.:
          #   "CATEGORY \n","DATE \n","BUY VALUE \n(₹ Crores)","SELL VALUE \n(₹ Crores)","NET VALUE \n(₹ Crores)"
          #   "DII","04-May-2026","19,516.11","14,751.95","4,764.16"
          #   "FII/FPI","04-May-2026","19,660.47","16,824.85","2,835.62"
          #
          # Strategy: collapse \n inside quoted fields → space, then parse with csv.DictReader.
          # Key normalisation strips spaces, ₹, (, ) → 'buyvaluecrores', 'sellvaluecrores', etc.
          if fiidii_files:
              # ── Parse ALL FII-DII CSV files (each file = one trading day) ──
              import re as _re

              def collapse_quoted_newlines(text):
                  result = []; in_quote = False
                  for c in text:
                      if c == '"': in_quote = not in_quote; result.append(c)
                      elif c == '\n' and in_quote: result.append(' ')
                      else: result.append(c)
                  return ''.join(result)

              def clean_key(k):
                  if k is None: return ''
                  return _re.sub(r'[^a-z0-9]', '', k.lower().replace('₹', ''))

              # Process every file — deduplicated by date
              fiidii_by_date = {}   # date_iso -> row dict
              fii_dii_raw = None    # will be set to the LATEST date's data

              for fiidii_path in sorted(fiidii_files):
                  print(f"Processing FII-DII: {os.path.basename(fiidii_path)}")
                  with open(fiidii_path, newline='', encoding='utf-8-sig') as fh:
                      raw_content = fh.read()
                  cleaned = collapse_quoted_newlines(raw_content)
                  reader = csv.DictReader(io.StringIO(cleaned))
                  rows_raw = list(reader)
                  print(f"  fieldnames: {reader.fieldnames}  rows: {len(rows_raw)}")

                  fii_buy = fii_sell = fii_net = 0.0
                  dii_buy = dii_sell = dii_net = 0.0
                  file_date = None

                  for row in rows_raw:
                      nrow = {clean_key(k): str(v).strip().strip('"') for k, v in row.items() if k}

                      def fval(*keys):
                          for k in keys:
                              v = nrow.get(k)
                              if v:
                                  try: return float(v.replace(',','').strip())
                                  except: pass
                          return 0.0

                      category = _re.sub(r'[^A-Z]', '', nrow.get('category', '').upper())

                      date_raw = nrow.get('date', '').strip()
                      if date_raw and not file_date:
                          for fmt_str in ('%d-%b-%Y', '%d-%B-%Y', '%d/%m/%Y', '%Y-%m-%d', '%d-%m-%Y'):
                              try:
                                  file_date = datetime.strptime(date_raw, fmt_str).strftime('%Y-%m-%d')
                                  break
                              except: continue

                      buy  = fval('buyvaluecrores', 'buyvalue', 'buy')
                      sell = fval('sellvaluecrores', 'sellvalue', 'sell')
                      net  = fval('netvaluecrores',  'netvalue',  'net')

                      if 'FII' in category:
                          fii_buy, fii_sell = buy, sell
                          fii_net = round(buy - sell, 2) if (buy or sell) else round(net, 2)
                      elif 'DII' in category:
                          dii_buy, dii_sell = buy, sell
                          dii_net = round(buy - sell, 2) if (buy or sell) else round(net, 2)

                  if not file_date:
                      # Try to extract date from filename: fii-dii_DDMMYYYY or fii-dii-DDMMYYYY
                      bn = os.path.basename(fiidii_path)
                      m = _re.search(r'(\d{8})', bn)
                      if m:
                          ds = m.group(1)
                          try:
                              candidate = f"{ds[4:8]}-{ds[2:4]}-{ds[0:2]}"
                              parsed_dt = datetime.strptime(candidate, '%Y-%m-%d')
                              # Sanity check: reject future dates (likely user typo like 07062026 vs 07052026)
                              today_dt = datetime.utcnow().replace(hour=0, minute=0, second=0, microsecond=0)
                              if parsed_dt > today_dt:
                                  print(f"  ⚠ WARNING: date in filename '{bn}' is FUTURE ({candidate}) — likely a typo. Skipping date from filename.")
                                  file_date = None
                              else:
                                  file_date = candidate
                          except:
                              file_date = None

                  if not file_date:
                      file_date = datetime.utcnow().strftime('%Y-%m-%d')
                      print(f"  ⚠ Could not parse date from '{os.path.basename(fiidii_path)}' — using today: {file_date}")

                  day_entry = {
                      'date': file_date,
                      'fii':  fii_net,  'dii':  dii_net,
                      'fiiBuy': fii_buy, 'fiiSell': fii_sell,
                      'diiBuy': dii_buy, 'diiSell': dii_sell,
                      'source': 'manual_upload'
                  }
                  # Keep latest data if multiple files share the same date
                  if file_date not in fiidii_by_date or fii_net != 0 or dii_net != 0:
                      fiidii_by_date[file_date] = day_entry

                  fiidii_rows.append({'date': file_date, 'fii': fii_net, 'dii': dii_net})
                  print(f"  Date: {file_date}  FII: ₹{fii_net:,.2f} Cr  DII: ₹{dii_net:,.2f} Cr")

                  print(f"  FII-DII parsed: {os.path.basename(fiidii_path)} (stays in uploads/)")

              # fii_dii_raw = latest date's data (for fiiDii field + meta)
              if fiidii_by_date:
                  latest_fd = sorted(fiidii_by_date.keys())[-1]
                  fii_dii_raw = fiidii_by_date[latest_fd]
                  print(f"  Latest FII-DII date: {latest_fd}  FII: ₹{fii_dii_raw['fii']:,.2f} Cr  DII: ₹{fii_dii_raw['dii']:,.2f} Cr")
                  # Deduplicate fiidii_rows by date, keep latest value per date
                  seen = {}
                  for r in fiidii_rows:
                      seen[r['date']] = r
                  fiidii_rows = sorted(seen.values(), key=lambda x: x['date'])
                  print(f"  Total FII-DII rows after dedup: {len(fiidii_rows)} days")

          # ── Parse CM Bhavcopy with Delivery (sec_bhavdata_full_DDMMYYYY.csv) ──
          # Source: NSE Archives → Capital Market → Bhavcopy with Delivery
          # URL: https://archives.nseindia.com/products/content/sec_bhavdata_full_DDMMYYYY.csv
          # Columns: SYMBOL, SERIES, TTL_TRD_QNTY, DELIV_QTY, DELIV_PER
          # Score impact: +4 pts if DELIV_PER>=60, +2 if >=45, -3 if <20 (with bullish F&O)
          delivery_data = {}   # sym -> delPct (float)
          if cm_bhav_files:
              cm_path = cm_bhav_files[-1]  # use newest
              print(f"Processing CM Bhavcopy: {os.path.basename(cm_path)}")
              try:
                  with open(cm_path, newline="", encoding="utf-8-sig") as fhcm:
                      _cm_reader = csv.DictReader(fhcm)
                      _cm_hdr = {str(h).strip().upper(): str(h).strip() for h in (_cm_reader.fieldnames or [])}
                      print(f"  CM header: {list(_cm_hdr.keys())[:8]}")
                      # Handle both old (DELIV_PER) and new (DELIV_QTY / TTL_TRD_QNTY) formats
                      _has_deliv_per = any("DELIV_PER" in h.upper() for h in (_cm_reader.fieldnames or []))
                      _fhcm2 = open(cm_path, newline="", encoding="utf-8-sig")
                      _cm_reader2 = csv.DictReader(_fhcm2)
                      for _r in _cm_reader2:
                          try:
                              # Normalize key names — strip whitespace
                              _nr = {str(k).strip().upper(): str(v).strip() for k,v in _r.items() if k}
                              _sym = _nr.get("SYMBOL","").strip().upper()
                              _ser = _nr.get("SERIES","").strip().upper()
                              if not _sym or _ser not in ("EQ","BE","BZ","SM"): continue
                              if _has_deliv_per:
                                  # sec_bhavdata_full format has DELIV_PER directly
                                  _dp = _nr.get("DELIV_PER","") or _nr.get("DELIV_PER ","") or ""
                                  _dp_val = float(_dp.replace(",","").strip()) if _dp.replace(",","").strip() else None
                              else:
                                  # Compute from TTL_TRD_QNTY and DELIV_QTY
                                  def _fcm(k): return float((_nr.get(k,"") or "0").replace(",","").strip() or 0)
                                  _tot = _fcm("TTL_TRD_QNTY") or _fcm("TOTTRDQTY")
                                  _del = _fcm("DELIV_QTY")
                                  _dp_val = round(_del / _tot * 100, 1) if _tot > 0 else None
                              if _dp_val is not None and 0 <= _dp_val <= 100:
                                  delivery_data[_sym] = _dp_val
                          except: continue
                      _fhcm2.close()
                  # Inject delivery% into signals
                  for _sym, _dp in delivery_data.items():
                      if _sym in signals:
                          signals[_sym]["delPct"] = _dp
                  print(f"  Delivery% injected for {len(delivery_data)} stocks")
                  # Spot check
                  for _chk in ["SUNPHARMA","RELIANCE","HDFCBANK"]:
                      if _chk in delivery_data:
                          print(f"  {_chk} delPct={delivery_data[_chk]}%  signal_del={signals.get(_chk,{}).get('delPct')}")
              except Exception as _cme:
                  print(f"  CM Bhavcopy parse error: {_cme}")

          # ── Build trendSeries from ALL FOVOLT files in uploads/ ──────
          # Each FOVOLT = one trading day. Loop oldest to newest, extract per-stock
          # score+d1, build scoreSeries, compute consistencyPct + momentum.
          # Makes F5 (Trend Consistency, 0-15 pts) work without Vercel API.
          import math as _math2

          def _parse_fovolt_date_fn(bn):
              try:
                  ds = bn.replace("FOVOLT_","").replace(".csv","")
                  if len(ds)==8: return f"{ds[4:8]}-{ds[2:4]}-{ds[0:2]}"
              except: pass
              return None

          def _parse_fovolt_scores(path):
              result = {}
              try:
                  with open(path, newline="", encoding="utf-8-sig") as fh:
                      reader = csv.reader(fh)
                      hdr = next(reader, None)
                      cs, ccl, cpr, clr, cft = 1, 2, 3, 4, 8
                      if hdr:
                          hl = [str(h).lower().replace(" ","").replace("_","") for h in hdr]
                          def _fc(opts, dfl):
                              for o in opts:
                                  for i,h in enumerate(hl):
                                      if o in h: return i
                              return dfl
                          cs  = _fc(["symbol","sym"], 1)
                          ccl = _fc(["underlyingvalue(a)","underlynga","underlyingvaluea"], 2)
                          cpr = _fc(["underlyingvalue(b)","underlyingb","underlyingvalueb"], 3)
                          clr = _fc(["logreturn","logret","logreturns"], 4)
                          cft = _fc(["futuresprice(g)","futurespriceg","futuresprice","futprice"], 8)
                      for row in reader:
                          try:
                              if len(row) < 9: continue
                              sym = row[cs].strip().upper()
                              if not sym or sym in INDEX_SYMS: continue
                              def _f(v):
                                  try: return float(str(v).replace(",","").strip())
                                  except: return None
                              cl = _f(row[ccl]); pr = _f(row[cpr])
                              lr = _f(row[clr]); ft = _f(row[cft])
                              if not cl or cl <= 0: continue
                              try:
                                  d1 = round((_math2.exp(lr)-1)*100,2) if lr else (round((cl-pr)/pr*100,2) if pr else 0.0)
                              except: d1 = 0.0
                              prem = round((ft-cl)/cl*100,3) if ft and cl else 0.0
                              score = round(max(-5.0,min(5.0,(d1/3.0)+(prem*0.5))),2)
                              result[sym] = {"score": score, "d1": d1}
                          except: continue
              except Exception as e:
                  print(f"  trendSeries parse error {os.path.basename(path)}: {e}")
              return result

          trend_series = {}
          all_fovolt_sorted = sorted(fovolt_files)
          print(f"  Building trendSeries from {len(all_fovolt_sorted)} FOVOLT files...")
          for _fp in all_fovolt_sorted:
              _date = _parse_fovolt_date_fn(os.path.basename(_fp))
              if not _date: continue
              for sym, sd in _parse_fovolt_scores(_fp).items():
                  if sym not in trend_series: trend_series[sym] = []
                  trend_series[sym].append({"date": _date, "score": sd["score"], "d1": sd["d1"]})

          for sym in trend_series:
              trend_series[sym] = sorted(trend_series[sym], key=lambda x: x["date"])[-30:]

          trend_stats = {}
          for sym, series in trend_series.items():
              scores = [e["score"] for e in series]
              n = len(scores)
              consist_pct = round(sum(1 for s in scores if s > 0) / n * 100, 1)
              if n >= 4:
                  r_avg = sum(scores[-3:])/3; p_avg = sum(scores[-6:-3])/max(1,len(scores[-6:-3]))
                  mom = "improving" if r_avg > p_avg+0.2 else "declining" if r_avg < p_avg-0.2 else "stable"
              else:
                  mom = "improving" if scores[-1]>scores[0] else "declining" if scores[-1]<scores[0] else "stable"
              avg_s = sum(scores)/n
              pos = "Strong" if avg_s>=1.5 and consist_pct>=70 else "Moderate" if avg_s>=0.5 and consist_pct>=55 else "Weak"
              trend_stats[sym] = {"daysTracked": n, "consistencyPct": consist_pct,
                                  "momentum": mom, "positionalStrength": pos,
                                  "scoreSeries": series[-10:]}

          print(f"  trendSeries: {len(trend_stats)} stocks")
          for _chk in ["SUNPHARMA","RELIANCE","HDFCBANK"]:
              if _chk in trend_stats:
                  ts = trend_stats[_chk]
                  print(f"  TREND {_chk}: {ts['daysTracked']}d consist={ts['consistencyPct']}% {ts['momentum']} {ts['positionalStrength']}")

          # ── Merge with existing fno_signals.json ─────────────────
          # Load existing data so we preserve bulk/block/insider/pcr/history
          existing = {}
          fno_path = 'data-repo/data/fno_signals.json'
          if os.path.exists(fno_path):
              try:
                  with open(fno_path) as fh:
                      existing = json.load(fh)
                  print(f"  Loaded existing fno_signals.json ({len(existing.get('signals',{}))} stocks)")
              except Exception as e:
                  print(f"  Could not load existing: {e}")

          # Determine fetch date — priority order (highest to lowest):
          #   1. BhavCopy TradDt field (most authoritative — comes from inside the file)
          #   2. FII-DII CSV date rows (actual trading date from file content)
          #   3. FOVOLT filename date (FOVOLT_DDMMYYYY.csv)
          #   4. Today's date (last resort)
          upload_date_iso = datetime.utcnow().strftime('%Y-%m-%d')
          date_source = 'utcnow_fallback'

          if bhavcopy_date_iso:
              # Highest priority: TradDt from inside the BhavCopy CSV
              upload_date_iso = bhavcopy_date_iso
              date_source = 'bhavcopy_traddt'
              print(f"  Date from BhavCopy TradDt: {upload_date_iso}")
          elif fiidii_files and fiidii_rows:
              # Second priority: actual date parsed from inside the FII-DII CSV
              upload_date_iso = fiidii_rows[-1]['date']
              date_source = 'fiidii_csv'
              print(f"  Date from FII-DII CSV rows: {upload_date_iso}")
          elif fovolt_files and 'fovolt_basename' in dir():
              # Third priority: parse from FOVOLT filename (FOVOLT_DDMMYYYY.csv)
              try:
                  ds_part = fovolt_basename.replace('FOVOLT_','').replace('.csv','')  # DDMMYYYY
                  if len(ds_part) == 8:
                      upload_date_iso = f"{ds_part[4:8]}-{ds_part[2:4]}-{ds_part[0:2]}"
                      date_source = 'fovolt_filename'
                      print(f"  Date from FOVOLT filename: {upload_date_iso}")
              except: pass
          print(f"  Upload date resolved: {upload_date_iso} (source={date_source})")

          fetch_date_str = datetime.strptime(upload_date_iso,'%Y-%m-%d').strftime('%d-%b-%Y')
          print(f"  Upload fetch_date_str: {fetch_date_str}")

          # ── Build complete FII/DII history from ALL sources ──────────
          # Source 1: ALL fii-dii CSVs in uploads/ (already parsed into fiidii_rows above)
          # Source 2: history/*.json from auto-fetch runs
          # fiidii_rows contains every CSV currently in uploads/ — no need to re-scan.
          import glob as _glob
          five_day_map2 = {}

          # From parsed CSV rows (all uploads/ CSVs)
          for r in fiidii_rows:
              dl = datetime.strptime(r['date'],'%Y-%m-%d').strftime('%a')
              five_day_map2[r['date']] = {'date': r['date'], 'd': dl,
                                          'fii': r['fii'], 'dii': r['dii']}

          # From history/*.json (auto-fetch snapshots — fills gaps CSV doesn't cover)
          for hf in sorted(_glob.glob('data-repo/data/history/*.json')):
              try:
                  with open(hf) as fh: hd = json.load(fh)
                  d = hd.get('fiiDii',{})
                  if d and (d.get('fii',0) or d.get('dii',0)):
                      day_label = os.path.basename(hf).replace('.json','')
                      if day_label not in five_day_map2:   # CSV data wins over history
                          dl = datetime.strptime(day_label,'%Y-%m-%d').strftime('%a')
                          five_day_map2[day_label] = {'date': day_label, 'd': dl,
                                                      'fii': d.get('fii',0), 'dii': d.get('dii',0)}
              except: continue

          five_day = sorted(five_day_map2.values(), key=lambda x: x['date'])[-30:]
          print(f"  fiiDiiHistory: {len(five_day)} days — {[r['date'] for r in five_day]}")

          # Use signals from upload if present, else carry from existing
          final_signals = signals if signals else existing.get('signals', {})
          final_count   = len(final_signals)

          # Use fii_dii from upload if present, else keep existing
          final_fii_dii = fii_dii_raw if fii_dii_raw else existing.get('fiiDii', {})

          # ── Build deliveryHistory (rolling, from all CM bhavcopy uploads) ──
          # Merge today's delivery_data with existing deliveryHistory
          existing_del_hist = existing.get("deliveryHistory", {})  # {date: {sym: delPct}}
          if delivery_data and upload_date_iso:
              existing_del_hist[upload_date_iso] = delivery_data
          # Keep last 30 dates
          del_hist_sorted = dict(sorted(existing_del_hist.items())[-30:])
          print(f"  deliveryHistory: {len(del_hist_sorted)} days")

          # ── Inject OI into signals and also rebuild OI classification ────────
          # oiChg already injected into signals[] above from BhavCopy parser
          # Now add trendStat into each signal for HTML scoring
          for sym, ts in trend_stats.items():
              if sym in final_signals:
                  final_signals[sym]["trend"] = ts

          output = {
              "signals":        final_signals,
              "fiiDii":         final_fii_dii,
              "fiiDiiHistory":  five_day[-30:],
              "trendStats":     trend_stats,          # per-stock trend from all FOVOLTs
              "deliveryHistory": del_hist_sorted,     # per-date delivery% from all CM bhavcopy
              "bulkDeals":      existing.get("bulkDeals", []),
              "blockDeals":     existing.get("blockDeals", []),
              "insiderData":    existing.get("insiderData", []),
              "pcr":            existing.get("pcr", {}),
              "meta": {
                  "date":               upload_date_iso,
                  "latestDate":         fetch_date_str,
                  "updatedAt":          datetime.utcnow().isoformat() + "Z",
                  "stockCount":         final_count,
                  "trendDays":          max((v["daysTracked"] for v in trend_stats.values()), default=0),
                  "fovoltFiles":        len(fovolt_files),
                  "workflowCompletedAt": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "carriedForwardFrom": None,
                  "source":             "manual_upload",
                  "version":            "V10"
              }
          }

          os.makedirs('data-repo/data/history', exist_ok=True)
          with open(fno_path, 'w') as fh:
              json.dump(output, fh, separators=(',',':'))
          print(f"Written fno_signals.json ({final_count} stocks, source=manual_upload)")

          # NOTE: history/*.json snapshots are no longer needed for FII-DII
          # because ALL fii-dii CSVs stay in uploads/ permanently.
          # Every run rebuilds fiiDiiHistory by re-reading all CSVs.
          # history/*.json are still written by the NSE auto-fetch path.

          # Confirm key prices written correctly
          for chk in ['SUNPHARMA','RELIANCE','HDFCBANK']:
              if chk in final_signals:
                  s = final_signals[chk]
                  print(f"  WRITTEN {chk}: cl={s.get('cl')}  d1={s.get('d1')}")

          hist_path = f'data-repo/data/history/{upload_date_iso}.json'
          with open(hist_path, 'w') as fh:
              json.dump(output, fh, separators=(',',':'))
          print(f"Written {hist_path}")

          # Update index.json
          all_hist = sorted([os.path.basename(f).replace('.json','')
                             for f in _glob.glob('data-repo/data/history/*.json')
                             if '.gitkeep' not in f])
          with open('data-repo/data/index.json', 'w') as fh:
              json.dump({'dates': all_hist[-30:],
                         'lastUpdated': datetime.utcnow().isoformat()+'Z',
                         'totalUploads': len(all_hist),
                         'latestDate': upload_date_iso,
                         'latestStockCount': final_count,
                         'version': 'V10'}, fh, indent=2)
          print(f"Updated index.json ({len(all_hist)} dates)")

          # Signal to next step that uploads were processed → skip NSE fetch
          with open('/tmp/upload_processed.env', 'w') as f:
              f.write('UPLOADS_FOUND=true\n')
          PYEOF

      - name: Load upload flag
        id: upload_flag
        run: |
          if [ -f /tmp/upload_processed.env ]; then
            cat /tmp/upload_processed.env >> $GITHUB_ENV
          else
            echo "UPLOADS_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Fetch NSE data + compute signals (V10)
        if: env.UPLOADS_FOUND != 'true'
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
          SKIP_NSE: ${{ github.event.inputs.skip_nse_fetch }}
        run: |
          python3 << 'PYEOF'
          import requests, time, json, csv, io, os, glob
          from datetime import datetime, date, timedelta

          # ── Resolve target date ───────────────────────────────────
          override = os.environ.get('DATE_OVERRIDE','').strip()
          if override:
              fetch_date_str = override
              fetch_date_iso = datetime.strptime(override,'%d-%b-%Y').strftime('%Y-%m-%d')
          else:
              today = date.today()
              if today.weekday() == 5: today -= timedelta(days=1)
              if today.weekday() == 6: today -= timedelta(days=2)
              fetch_date_str = today.strftime('%d-%b-%Y')
              fetch_date_iso = today.strftime('%Y-%m-%d')
          print(f"Target date: {fetch_date_str} ({fetch_date_iso})")

          NSE = "https://www.nseindia.com"
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
              "Accept-Encoding": "gzip, deflate, br",
              "Connection": "keep-alive",
          }

          signals = {}
          fii_dii = {}
          bulk_deals = []
          block_deals = []
          insider_data = []
          pcr_data = {}
          delivery_data = {}
          stock_count = 0

          if os.environ.get('SKIP_NSE','false').lower() != 'true':
              session = requests.Session()
              session.headers.update(HEADERS)

              # ── Establish NSE session (cookie handshake) ──────────
              print("Establishing NSE session...")
              try:
                  session.get(NSE, timeout=20)
                  time.sleep(2)
                  session.get(NSE + "/all-reports-derivatives", timeout=20)
                  time.sleep(2)
                  session.headers.update({
                      "Referer": NSE + "/all-reports-derivatives",
                      "Accept": "application/json, text/plain, */*",
                  })
              except Exception as e:
                  print(f"Session error: {e}")

              def nse_report(name, category, section, date_str):
                  try:
                      archives = json.dumps([{"name": name,"type":"archives","category": category,"section": section}])
                      params = {"archives": archives,"date": date_str,"type": section,"mode": "single"}
                      r = session.get(NSE + "/api/reports", params=params, timeout=30)
                      print(f"  {name[:30]}: HTTP {r.status_code}")
                      if r.status_code != 200: return None
                      links = r.json()
                      if isinstance(links, list) and links:
                          url = links[0].get('link','')
                          if url:
                              time.sleep(1)
                              dr = session.get(url, timeout=30)
                              return dr.text
                  except Exception as e:
                      print(f"  Report error: {e}")
                  return None

              # ── F&O Daily Volatility CSV ──────────────────────────
              print("Fetching F&O Volatility...")
              fovolt = nse_report("F&O - Daily Volatility (csv)", "derivatives", "equity", fetch_date_str)
              time.sleep(2)

              if fovolt:
                  INDEX_SYMS = {'NIFTY','BANKNIFTY','SENSEX','FINNIFTY','NIFTYNXT50','MIDCPNIFTY','BANKEX',
                                'SX40','SENSEX50'}
                  import math as _math

                  # ── Print header so we can see the real column names in logs ──
                  lines = fovolt.strip().splitlines()
                  print(f"  FOVOLT header: {lines[0][:200] if lines else 'EMPTY'}")

                  # ── Read by POSITION with header-name fallback ──────────────
                  # FOVOLT column layout (0-indexed, confirmed from NSE archive):
                  #   0  Date
                  #   1  Symbol
                  #   2  Underlying Value (A)  ← SPOT close        ✅ → cl
                  #   3  Underlying Value (B)  ← Prev day spot     ✅ → pr
                  #   4  Log Returns (Underlying)                   → d1
                  #   5  Previous Day Volatility (Underlying)
                  #   6  Current Day Daily Volatility (Underlying)
                  #   7  Annualised Volatility (Underlying)         → vol
                  #   8  Futures Price (G)     ← near-month futures ❌ NOT spot
                  reader = csv.reader(io.StringIO(fovolt))
                  raw_header = next(reader)   # consume header row

                  # Build column-index map from actual header (guards against NSE renames)
                  _hl = [str(h).lower().replace(' ','').replace('_','') for h in raw_header]
                  def _acol(candidates, default):
                      for c in candidates:
                          for i, h in enumerate(_hl):
                              if c in h: return i
                      return default

                  _col_sym     = _acol(['symbol','sym'], 1)
                  _col_cl      = _acol(['underlyingvalue(a)','underlynga','undrlygval(a)','underlyingvaluea'], 2)
                  _col_pr      = _acol(['underlyingvalue(b)','underlyingb','undrlygval(b)','underlyingvalueb'], 3)
                  _col_logr    = _acol(['logreturn','logret','logreturns'], 4)
                  _col_prevvol    = _acol(['previousdayunderlyingvolatility(d)','previousdayvolatility','prevdayvol','prevvol'], 5)
                  _col_curvol     = _acol(['currentdayunderlyingdailyvolatility(e)','currentdaydailyvolatility','currentdayvol','dailyvolatility'], 6)
                  _col_vol        = _acol(['underlyingannualisedvolatility(f)','annualisedvolatility','annualizedvolatility','annvol'], 7)
                  _col_fut        = _acol(['futurescloseprice(g)','futuresprice(g)','futurespriceg','futuresprice','futprice'], 8)
                  _col_prevfut    = _acol(['futurespreviousdaycloseprice(h)','futuresprice(h)','futurespriceh','previousfuturesprice','prevfutprice'], 9)
                  _col_futlogr    = _acol(['futureslogreturns(i)','futureslogreturn','futlogret','futlogreturns'], 10)
                  _col_prevfutvol = _acol(['previousdayfuturesvolatility(j)','previousdayfuturesvolatility','prevdayfutvol','prevfutvol'], 11)
                  _col_curfutvol  = _acol(['currentdayfuturesdailyvolatility(k)','currentdayfuturesvolatility','currentdayfutvol','curfutvol'], 12)
                  _col_futannvol  = _acol(['futuresannualisedvolatility(l)','futuresannualisedvolatility','futannvol'], 13)
                  _col_appannvol  = _acol(['applicableannualisedvolatility(n)','applicableannualisedvolatility','appannvol'], 15)
                  print(f"  FOVOLT col map: cl={_col_cl} vol={_col_vol} fut={_col_fut} futLogR={_col_futlogr} futAnnVol={_col_futannvol} appAnnVol={_col_appannvol}")

                  for row in reader:
                      try:
                          if len(row) < 9: continue
                          sym = row[_col_sym].strip().upper()
                          if not sym or sym in INDEX_SYMS: continue

                          def _f(v):
                              try: return float(str(v).replace(',','').strip())
                              except: return None

                          cl           = _f(row[_col_cl])                                              # C
                          pr           = _f(row[_col_pr])                                              # D
                          log_ret      = _f(row[_col_logr])                                            # E
                          prev_vol     = _f(row[_col_prevvol])                                         # F
                          cur_vol      = _f(row[_col_curvol])                                          # G
                          vol_ann      = _f(row[_col_vol])                                             # H
                          fut_cl       = _f(row[_col_fut])                                             # I
                          prev_fut_cl  = _f(row[_col_prevfut])   if len(row)>_col_prevfut   else None  # J
                          fut_log_ret  = _f(row[_col_futlogr])   if len(row)>_col_futlogr   else None  # K
                          prev_fut_vol = _f(row[_col_prevfutvol])if len(row)>_col_prevfutvol else None # L
                          cur_fut_vol  = _f(row[_col_curfutvol]) if len(row)>_col_curfutvol  else None # M
                          fut_ann_vol  = _f(row[_col_futannvol]) if len(row)>_col_futannvol  else None # N
                          app_ann_vol  = _f(row[_col_appannvol]) if len(row)>_col_appannvol  else None # O

                          if cl is None or cl == 0: continue

                          try:
                              d1 = round((_math.exp(log_ret) - 1) * 100, 2) if log_ret else                                    (round(((cl - pr) / pr * 100), 2) if pr else 0.0)
                          except: d1 = 0.0

                          try:
                              fut_d1 = round((_math.exp(fut_log_ret) - 1) * 100, 2) if fut_log_ret else                                        (round(((fut_cl - prev_fut_cl) / prev_fut_cl * 100), 2) if (fut_cl and prev_fut_cl and prev_fut_cl > 0) else None)
                          except: fut_d1 = None

                          try:
                              prem = round((fut_cl - cl) / cl * 100, 3) if fut_cl and cl else 0.0
                          except: prem = 0.0

                          vol           = round(vol_ann,      1) if vol_ann      else 0.0
                          pv            = round(prev_vol,     4) if prev_vol     else None
                          cv            = round(cur_vol,      4) if cur_vol      else None
                          pv_fut        = round(prev_fut_vol, 4) if prev_fut_vol else None
                          cv_fut        = round(cur_fut_vol,  4) if cur_fut_vol  else None
                          vol_delta     = round(cv - pv,           4) if (cv is not None and pv is not None)         else None
                          fut_vol_delta = round(cv_fut - pv_fut,   4) if (cv_fut is not None and pv_fut is not None) else None

                          raw   = (d1 / 3.0) + (prem * 0.5)
                          score = round(max(-5.0, min(5.0, raw)), 2)
                          label = ('Strong Bullish' if score >= 3   else
                                   'Bullish'        if score >= 1.5 else
                                   'Mild Bullish'   if score >= 0.5 else
                                   'Strong Bearish' if score <= -3  else
                                   'Bearish'        if score <= -1.5 else
                                   'Mild Bearish'   if score <= -0.5 else 'Neutral')

                          signals[sym] = {
                              'score': score, 'label': label,
                              'cl': cl,    'pr': pr,    'd1': str(d1), 'd2': str(d1),
                              'futCl': fut_cl,          'prevFutCl': prev_fut_cl,
                              'futD1': fut_d1,
                              'prevVol': pv,            'curVol': cv,      'volDelta': vol_delta,
                              'prevFutVol': pv_fut,     'curFutVol': cv_fut, 'futVolDelta': fut_vol_delta,
                              'spotAnnVol': vol_ann,    'futAnnVol': fut_ann_vol,
                              'appAnnVol':  app_ann_vol,
                              'prem': str(prem), 'vol': str(vol)
                          }
                          stock_count += 1
                      except: continue

                  print(f"  Parsed {stock_count} stocks")
                  # Spot-check — SUNPHARMA should show actual spot (e.g. ~1823), not futures price (~1717)
                  for _chk in ['SUNPHARMA','RELIANCE','HDFCBANK']:
                      if _chk in signals:
                          s = signals[_chk]
                          print(f"  CHECK {_chk}: cl={s['cl']}  prem={s['prem']}  d1={s['d1']}")

              # ── FII/DII flow ──────────────────────────────────────
              print("Fetching FII/DII flow...")
              try:
                  session.headers.update({"Referer": NSE + "/market-data/live-equity-market"})
                  fii_r = session.get(NSE + "/api/fiidiiTradeReact", timeout=20)
                  if fii_r.status_code == 200:
                      fii_data = fii_r.json()
                      if isinstance(fii_data, list) and fii_data:
                          latest = fii_data[0]
                          fii_buy  = float(str(latest.get('fiiBuy','0')).replace(',','') or 0)
                          fii_sell = float(str(latest.get('fiiSell','0')).replace(',','') or 0)
                          dii_buy  = float(str(latest.get('diiBuy','0')).replace(',','') or 0)
                          dii_sell = float(str(latest.get('diiSell','0')).replace(',','') or 0)
                          fii_dii = {
                              'fii': round(fii_buy - fii_sell, 2),
                              'dii': round(dii_buy - dii_sell, 2),
                              'fiiBuy': fii_buy, 'fiiSell': fii_sell,
                              'diiBuy': dii_buy, 'diiSell': dii_sell,
                              'date': fetch_date_iso
                          }
                          print(f"  FII net: {fii_dii['fii']} Cr, DII net: {fii_dii['dii']} Cr")
              except Exception as e:
                  print(f"  FII/DII error: {e}")
              time.sleep(1)

              # ── Bulk + Block deals ────────────────────────────────
              print("Fetching Bulk/Block deals...")
              try:
                  session.headers.update({"Referer": NSE + "/companies-listing/corporate-filings-bulk-deals"})
                  bulk_r = session.get(NSE + f"/api/historical/bulk-deals?from={fetch_date_iso}&to={fetch_date_iso}", timeout=20)
                  if bulk_r.status_code == 200:
                      for d in (bulk_r.json().get('data') or []):
                          try:
                              qty = float(str(d.get('quantityTraded','0')).replace(',','') or 0)
                              price = float(str(d.get('tradePrice','0')).replace(',','') or 0)
                              value = round((qty * price) / 1e7, 2)  # in Crores
                              bulk_deals.append({
                                  'stock': str(d.get('symbol','')).upper().strip(),
                                  'client': str(d.get('clientName','')).strip(),
                                  'type': 'BUY' if str(d.get('buySell','')).upper().startswith('B') else 'SELL',
                                  'qty': int(qty), 'price': price, 'value': value,
                                  'date': fetch_date_str
                              })
                          except: continue
                  block_r = session.get(NSE + f"/api/historical/block-deals?from={fetch_date_iso}&to={fetch_date_iso}", timeout=20)
                  if block_r.status_code == 200:
                      for d in (block_r.json().get('data') or []):
                          try:
                              qty = float(str(d.get('quantityTraded','0')).replace(',','') or 0)
                              price = float(str(d.get('tradePrice','0')).replace(',','') or 0)
                              value = round((qty * price) / 1e7, 2)
                              block_deals.append({
                                  'stock': str(d.get('symbol','')).upper().strip(),
                                  'client': str(d.get('clientName','')).strip(),
                                  'type': 'BUY' if str(d.get('buySell','')).upper().startswith('B') else 'SELL',
                                  'qty': int(qty), 'price': price, 'value': value,
                                  'date': fetch_date_str
                              })
                          except: continue
                  print(f"  Bulk: {len(bulk_deals)}, Block: {len(block_deals)}")
              except Exception as e:
                  print(f"  Deals error: {e}")
              time.sleep(1)

              # ── #2 INSIDER TRADING — NSE SAST/Form-C ─────────────
              # NSE publishes insider trading disclosures as JSON via corporate filings API
              print("Fetching Insider Trading disclosures...")
              try:
                  session.headers.update({"Referer": NSE + "/companies-listing/corporate-filings-insider-trading"})
                  # Fetch last 7 days of insider trading
                  from_date = (datetime.strptime(fetch_date_iso,'%Y-%m-%d') - timedelta(days=7)).strftime('%Y-%m-%d')
                  ins_r = session.get(
                      NSE + f"/api/corporates-pit?index=equities&from_date={from_date}&to_date={fetch_date_iso}&category=insider-trading-initial",
                      timeout=25
                  )
                  if ins_r.status_code == 200:
                      ins_data = ins_r.json()
                      for d in (ins_data.get('data') or [])[:50]:
                          try:
                              qty = float(str(d.get('noOfShareAcqOrDisp','0')).replace(',','') or 0)
                              price = float(str(d.get('acqFromDt_price','0')).replace(',','') or 0)
                              value = round((qty * price) / 1e7, 2)
                              trans_type = str(d.get('typeOfSecuritiesPostTrans',''))
                              buy_sell = 'BUY' if 'acq' in str(d.get('typeOfTrans','')).lower() or value > 0 else 'SELL'
                              insider_data.append({
                                  'stock': str(d.get('symbol','')).upper().strip(),
                                  'person': str(d.get('personName','')).strip(),
                                  'role': str(d.get('personCategory','')).strip(),
                                  'type': buy_sell,
                                  'qty': int(qty),
                                  'price': price,
                                  'value': value,
                                  'date': str(d.get('intimDt',fetch_date_str))[:10],
                                  'mode': str(d.get('acqDisp','')).strip()
                              })
                          except: continue
                  # Also try the SAST endpoint (promoter acquisitions)
                  sast_r = session.get(
                      NSE + f"/api/corporates-pit?index=equities&from_date={from_date}&to_date={fetch_date_iso}&category=insider-trading-continual",
                      timeout=25
                  )
                  if sast_r.status_code == 200:
                      for d in (sast_r.json().get('data') or [])[:20]:
                          try:
                              qty = float(str(d.get('noOfShareAcqOrDisp','0')).replace(',','') or 0)
                              price = float(str(d.get('acqFromDt_price','0')).replace(',','') or 0)
                              value = round((qty * price) / 1e7, 2)
                              insider_data.append({
                                  'stock': str(d.get('symbol','')).upper().strip(),
                                  'person': str(d.get('personName','')).strip(),
                                  'role': 'Promoter',
                                  'type': 'BUY' if 'acq' in str(d.get('typeOfTrans','')).lower() else 'SELL',
                                  'qty': int(qty), 'price': price, 'value': value,
                                  'date': str(d.get('intimDt',fetch_date_str))[:10],
                                  'mode': 'Market Purchase'
                              })
                          except: continue
                  print(f"  Insider disclosures: {len(insider_data)}")
              except Exception as e:
                  print(f"  Insider error: {e}")
              time.sleep(1)

              # ── #10 DELIVERY VOLUME from NSE Bhavcopy ─────────────
              print("Fetching delivery volume data...")
              try:
                  # NSE CM bhavcopy (equity delivery data) 
                  del_r = nse_report("CM - Bhavcopy with delivery position", "equities", "equity", fetch_date_str)
                  if del_r:
                      reader2 = csv.DictReader(io.StringIO(del_r))
                      for row in reader2:
                          try:
                              sym = str(row.get('SYMBOL','').strip().upper())
                              if not sym: continue
                              tot_traded = float(str(row.get('TOTTRDQTY','0')).replace(',','') or 0)
                              del_qty = float(str(row.get('DELIV_QTY','0')).replace(',','') or 0)
                              if tot_traded > 0:
                                  del_pct = round(del_qty / tot_traded * 100, 1)
                                  delivery_data[sym] = del_pct
                          except: continue
                      # Inject delivery% into signals
                      for sym in signals:
                          if sym in delivery_data:
                              signals[sym]['delPct'] = delivery_data[sym]
                      print(f"  Delivery data for {len(delivery_data)} stocks")
              except Exception as e:
                  print(f"  Delivery error: {e}")
              time.sleep(1)

              # ── #10b NSE FO BhavCopy — enrich spot closes ──────────
              # If FOVOLT data was fetched, the new BhavCopy_NSE_FO_* file format contains
              # UndrlygPric which is the authoritative spot close. Try to fetch it and
              # use it to correct/confirm the cl values written from FOVOLT col[2].
              # Also: use TradDt from bhavcopy to set/confirm fetch_date_iso.
              print("Fetching FO BhavCopy (UndrlygPric enrichment)...")
              try:
                  fo_bhav_r = nse_report("F&O - Bhavcopy", "derivatives", "equity", fetch_date_str)
                  if fo_bhav_r:
                      INDEX_SYMS_FO = {'NIFTY','BANKNIFTY','SENSEX','FINNIFTY','NIFTYNXT50','MIDCPNIFTY','BANKEX','SX40','SENSEX50'}
                      fo_bhav_reader = csv.DictReader(io.StringIO(fo_bhav_r))
                      fo_bhav_hdr = fo_bhav_reader.fieldnames or []
                      def _nb(k): return str(k).strip().replace(' ','').replace('_','').lower()
                      nb_norm = {_nb(h): h for h in fo_bhav_hdr}
                      def _nbfld(*names):
                          for n in names:
                              if n in nb_norm: return nb_norm[n]
                          return None
                      fld_tsym  = _nbfld('tckrsymb','symbol','sym')
                      fld_tdt   = _nbfld('traddt','tradingdate','trddt','bizdt')
                      fld_undrl = _nbfld('undrlygpric','underlyingprice','underlyingvalue')
                      fld_inst2 = _nbfld('fininstrmn','instrumenttype','instrmtype')
                      _bhav_date_seen = None
                      _updated = 0
                      for row2 in fo_bhav_reader:
                          try:
                              if not fld_tsym: break
                              sym2 = str(row2.get(fld_tsym,'')).strip().upper()
                              if not sym2 or sym2 in INDEX_SYMS_FO: continue
                              if fld_inst2:
                                  inst2 = str(row2.get(fld_inst2,'')).strip().upper()
                                  if inst2 != 'FUTSTK': continue
                              if fld_undrl:
                                  try: spot2 = float(str(row2.get(fld_undrl,'')).replace(',','').strip() or '0')
                                  except: continue
                                  if spot2 > 0 and sym2 in signals:
                                      signals[sym2]['cl'] = spot2
                                      _updated += 1
                              if fld_tdt and not _bhav_date_seen:
                                  raw_td = str(row2.get(fld_tdt,'')).strip()
                                  for fmt in ('%Y-%m-%d','%d-%b-%Y','%d/%m/%Y','%d-%m-%Y','%Y%m%d'):
                                      try:
                                          from datetime import datetime as _dtp2
                                          _bhav_date_seen = _dtp2.strptime(raw_td, fmt).strftime('%Y-%m-%d')
                                          break
                                      except: continue
                          except: continue
                      print(f"  FO BhavCopy: updated {_updated} spot closes from UndrlygPric")
                      if _bhav_date_seen:
                          fetch_date_iso = _bhav_date_seen
                          fetch_date_str = _bhav_date_seen[:4]+'-'+_bhav_date_seen[5:7]+'-'+_bhav_date_seen[8:]
                          from datetime import datetime as _dtp3
                          fetch_date_str = _dtp3.strptime(_bhav_date_seen,'%Y-%m-%d').strftime('%d-%b-%Y')
                          print(f"  Date confirmed from FO BhavCopy TradDt: {fetch_date_iso}")
                      for _chk in ['SUNPHARMA','RELIANCE','HDFCBANK']:
                          if _chk in signals:
                              print(f"  POST-BHAV {_chk}: cl={signals[_chk]['cl']}")
              except Exception as e:
                  print(f"  FO BhavCopy error: {e}")
              time.sleep(1)

              # ── #11 PCR (Put-Call Ratio) per stock ────────────────
              print("Fetching PCR per stock...")
              try:
                  session.headers.update({"Referer": NSE + "/option-chain"})
                  # Nifty PCR from OI data
                  nifty_oc = session.get(NSE + "/api/option-chain-indices?symbol=NIFTY", timeout=20)
                  if nifty_oc.status_code == 200:
                      oc_data = nifty_oc.json()
                      total_put_oi = sum(r.get('PE',{}).get('openInterest',0) for r in (oc_data.get('records',{}).get('data') or []) if r.get('PE'))
                      total_call_oi = sum(r.get('CE',{}).get('openInterest',0) for r in (oc_data.get('records',{}).get('data') or []) if r.get('CE'))
                      if total_call_oi > 0:
                          pcr_data['NIFTY'] = round(total_put_oi / total_call_oi, 2)
                          print(f"  NIFTY PCR: {pcr_data['NIFTY']}")
                  time.sleep(1)
                  # BankNifty PCR
                  bnk_oc = session.get(NSE + "/api/option-chain-indices?symbol=BANKNIFTY", timeout=20)
                  if bnk_oc.status_code == 200:
                      oc_data2 = bnk_oc.json()
                      tpo = sum(r.get('PE',{}).get('openInterest',0) for r in (oc_data2.get('records',{}).get('data') or []) if r.get('PE'))
                      tco = sum(r.get('CE',{}).get('openInterest',0) for r in (oc_data2.get('records',{}).get('data') or []) if r.get('CE'))
                      if tco > 0: pcr_data['BANKNIFTY'] = round(tpo / tco, 2)
                  time.sleep(1)
                  # Top 10 individual stocks PCR
                  top_stocks = ['ICICIBANK','HDFCBANK','RELIANCE','INFY','TCS','BAJFINANCE','AXISBANK','SBIN','BHARTIARTL','LT','TATAMOTORS','SUNPHARMA']
                  for sym in top_stocks:
                      try:
                          r = session.get(NSE + f"/api/option-chain-equities?symbol={sym}", timeout=15)
                          if r.status_code == 200:
                              d = r.json()
                              tpo = sum(x.get('PE',{}).get('openInterest',0) for x in (d.get('records',{}).get('data') or []) if x.get('PE'))
                              tco = sum(x.get('CE',{}).get('openInterest',0) for x in (d.get('records',{}).get('data') or []) if x.get('CE'))
                              if tco > 0: pcr_data[sym] = round(tpo / tco, 2)
                          time.sleep(0.5)
                      except: continue
                  print(f"  PCR data for {len(pcr_data)} symbols")
              except Exception as e:
                  print(f"  PCR error: {e}")

          # ── Build FII/DII chart history ───────────────────────────
          # Source priority (all merged, deduped by date):
          #   1. All fii-dii CSVs in uploads/ (permanent source of truth)
          #   2. history/*.json snapshots (from previous auto-fetch runs)
          #   3. Today's just-fetched fii_dii
          import re as _re2
          five_day_map = {}   # date_iso -> {date, d, fii, dii}

          # 1. Parse ALL fii-dii CSVs from uploads/ (same parser as manual upload step)
          _uploads = 'data-repo/data/uploads'
          _fiidii_csvs = sorted(set(
              glob.glob(f'{_uploads}/fii-dii_*.csv') +
              glob.glob(f'{_uploads}/fii-dii-*.csv') +
              glob.glob(f'{_uploads}/FIIDII_*.csv')  +
              glob.glob(f'{_uploads}/fiidii_*.csv')
          ))
          print(f"  Scanning {len(_fiidii_csvs)} fii-dii CSVs from uploads/")
          for _fp in _fiidii_csvs:
              try:
                  with open(_fp, newline='', encoding='utf-8-sig') as _fh:
                      _raw = _fh.read()
                  # Collapse newlines inside quoted fields
                  _res=[]; _iq=False
                  for _c in _raw:
                      if _c=='"': _iq=not _iq; _res.append(_c)
                      elif _c=='\n' and _iq: _res.append(' ')
                      else: _res.append(_c)
                  _cleaned=''.join(_res)
                  _reader=csv.DictReader(io.StringIO(_cleaned))
                  _rows=list(_reader)
                  def _ck(k): return _re2.sub(r'[^a-z0-9]','',k.lower().replace('₹','')) if k else ''
                  _fb=_fs=_db=_ds=_fn=_dn=0.0; _fd=None
                  for _r in _rows:
                      _nr={_ck(k):str(v).strip().strip('"') for k,v in _r.items() if k}
                      def _fv(*ks):
                          for _k in ks:
                              _v=_nr.get(_k)
                              if _v:
                                  try: return float(_v.replace(',','').strip())
                                  except: pass
                          return 0.0
                      _cat=_re2.sub(r'[^A-Z]','',_nr.get('category','').upper())
                      _dr=_nr.get('date','').strip()
                      if _dr and not _fd:
                          for _fmt in ('%d-%b-%Y','%d-%B-%Y','%d/%m/%Y','%Y-%m-%d','%d-%m-%Y'):
                              try: _fd=datetime.strptime(_dr,_fmt).strftime('%Y-%m-%d'); break
                              except: continue
                      _buy=_fv('buyvaluecrores','buyvalue','buy')
                      _sell=_fv('sellvaluecrores','sellvalue','sell')
                      _net=_fv('netvaluecrores','netvalue','net')
                      if 'FII' in _cat: _fb,_fs,_fn=_buy,_sell,round(_buy-_sell,2) if (_buy or _sell) else round(_net,2)
                      elif 'DII' in _cat: _db,_ds,_dn=_buy,_sell,round(_buy-_sell,2) if (_buy or _sell) else round(_net,2)
                  # Try filename date as fallback
                  if not _fd:
                      _m=_re2.search(r'(\d{8})',os.path.basename(_fp))
                      if _m:
                          _ds2=_m.group(1)
                          try:
                              _cand=f"{_ds2[4:8]}-{_ds2[2:4]}-{_ds2[0:2]}"
                              _pdt=datetime.strptime(_cand,'%Y-%m-%d')
                              if _pdt<=datetime.utcnow(): _fd=_cand
                          except: pass
                  if _fd:
                      _dl=datetime.strptime(_fd,'%Y-%m-%d').strftime('%a')
                      five_day_map[_fd]={'date':_fd,'d':_dl,'fii':_fn,'dii':_dn}
                      print(f"  CSV {os.path.basename(_fp)}: {_fd} FII={_fn:,.0f} DII={_dn:,.0f}")
              except Exception as _e:
                  print(f"  Skipped {os.path.basename(_fp)}: {_e}")

          # 2. Merge history/*.json (auto-fetch snapshots) — don't overwrite CSV data
          for hf in sorted(glob.glob('data-repo/data/history/*.json')):
              try:
                  with open(hf) as f: hd = json.load(f)
                  d = hd.get('fiiDii',{})
                  if d and (d.get('fii',0) or d.get('dii',0)):
                      day_label = os.path.basename(hf).replace('.json','')
                      if day_label not in five_day_map:   # CSV data takes priority
                          dl = datetime.strptime(day_label,'%Y-%m-%d').strftime('%a')
                          five_day_map[day_label] = {
                              'date': day_label, 'd': dl,
                              'fii': d.get('fii',0), 'dii': d.get('dii',0)
                          }
              except: continue

          # 3. Add today's fetched data
          if fii_dii:
              dl = datetime.strptime(fetch_date_iso,'%Y-%m-%d').strftime('%a')
              five_day_map[fetch_date_iso] = {
                  'date': fetch_date_iso, 'd': dl,
                  'fii': fii_dii.get('fii',0), 'dii': fii_dii.get('dii',0)
              }

          five_day = sorted(five_day_map.values(), key=lambda x: x['date'])[-30:]
          print(f"  fiiDiiHistory: {len(five_day)} days — {[r['date'] for r in five_day]}")

          # ── Guard: abort if NSE fetch returned too few stocks ─────
          # ── Retry + carry-forward if NSE fetch insufficient ────────────
          if stock_count < 100:
              print(f"WARNING: Only {stock_count} stocks parsed. Checking history for carry-forward...")
              import glob as _glob
              hist_files = sorted(_glob.glob('data-repo/data/history/*.json'))
              carried = False
              carry_from = None
              for hf in reversed(hist_files):
                  try:
                      with open(hf) as _f: prev = json.load(_f)
                      if len(prev.get('signals', {})) >= 100:
                          signals = prev['signals']
                          stock_count = len(signals)
                          carry_from = os.path.basename(hf).replace('.json','')
                          print(f"  Carried {stock_count} signals from {carry_from}")
                          carried = True
                          break
                  except: continue
              if not carried:
                  print("CRITICAL: No valid history found. Aborting.")
                  import sys; sys.exit(1)

          # ── Assemble and write JSON ───────────────────────────────
          from datetime import datetime as dt

          # ── Auto-fetch also reads uploads/ FOVOLTs for trendSeries ─────
          import glob as _aglob
          _af_fovolt = sorted(_aglob.glob("data-repo/data/uploads/FOVOLT_*.csv"))
          _af_trend_series = {}
          for _fp2 in _af_fovolt:
              _bn2 = os.path.basename(_fp2)
              ds2 = _bn2.replace("FOVOLT_","").replace(".csv","")
              _date2 = f"{ds2[4:8]}-{ds2[2:4]}-{ds2[0:2]}" if len(ds2)==8 else None
              if not _date2: continue
              try:
                  with open(_fp2, newline="", encoding="utf-8-sig") as fh2:
                      _r2 = csv.reader(fh2); next(_r2,None)
                      for row2 in _r2:
                          try:
                              sym2=row2[1].strip().upper()
                              if not sym2 or sym2 in INDEX_SYMS: continue
                              def _f2(v):
                                  try: return float(str(v).replace(",","").strip())
                                  except: return None
                              cl2=_f2(row2[2]);pr2=_f2(row2[3]);lr2=_f2(row2[4]);ft2=_f2(row2[8])
                              if not cl2 or cl2<=0: continue
                              import math as _m3
                              d12=round((_m3.exp(lr2)-1)*100,2) if lr2 else (round((cl2-pr2)/pr2*100,2) if pr2 else 0.0)
                              pm2=round((ft2-cl2)/cl2*100,3) if ft2 and cl2 else 0.0
                              sc2=round(max(-5.0,min(5.0,(d12/3.0)+(pm2*0.5))),2)
                              if sym2 not in _af_trend_series: _af_trend_series[sym2]=[]
                              _af_trend_series[sym2].append({"date":_date2,"score":sc2,"d1":d12})
                          except: continue
              except: continue
          _af_trend_stats = {}
          for sym2,ser2 in _af_trend_series.items():
              ser2=sorted(ser2,key=lambda x:x["date"])[-30:]
              sc2=[e["score"] for e in ser2]; n2=len(sc2)
              cp2=round(sum(1 for s in sc2 if s>0)/n2*100,1)
              ra2=sum(sc2[-3:])/3 if n2>=3 else sc2[-1]
              pa2=sum(sc2[-6:-3])/max(1,len(sc2[-6:-3])) if n2>=4 else sc2[0]
              mom2="improving" if ra2>pa2+0.2 else "declining" if ra2<pa2-0.2 else "stable"
              av2=sum(sc2)/n2
              pos2="Strong" if av2>=1.5 and cp2>=70 else "Moderate" if av2>=0.5 and cp2>=55 else "Weak"
              _af_trend_stats[sym2]={"daysTracked":n2,"consistencyPct":cp2,"momentum":mom2,"positionalStrength":pos2,"scoreSeries":ser2[-10:]}
          # Inject trend into signals
          for sym2,ts2 in _af_trend_stats.items():
              if sym2 in signals: signals[sym2]["trend"]=ts2
          print(f"  auto-fetch trendSeries: {len(_af_trend_stats)} stocks from {len(_af_fovolt)} FOVOLTs")

          # ── Assemble and write JSON ───────────────────────────────
          from datetime import datetime as dt
          output = {
              'signals':        signals,
              'fiiDii':         fii_dii,
              'fiiDiiHistory':  five_day[-30:],
              'trendStats':     _af_trend_stats,
              'deliveryHistory': {},
              'bulkDeals':      bulk_deals,
              'blockDeals':     block_deals,
              'insiderData':    insider_data,
              'pcr':            pcr_data,
              'meta': {
                  'date':               fetch_date_iso,
                  'latestDate':         fetch_date_str,
                  'updatedAt':          dt.utcnow().isoformat() + 'Z',
                  'workflowCompletedAt': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                  'stockCount':         stock_count,
                  'trendDays':          max((_af_trend_stats[s]['daysTracked'] for s in _af_trend_stats),default=0),
                  'fovoltFiles':        len(_af_fovolt),
                  'source':             'nse_auto_fetch',
                  'carriedForwardFrom': carry_from if 'carry_from' in dir() and carry_from else None,
                  'version':            'V10'
              }
          }

          os.makedirs('data-repo/data/history', exist_ok=True)
          with open('data-repo/data/fno_signals.json','w') as f:
              json.dump(output, f, separators=(',',':'))
          print(f"Written fno_signals.json ({stock_count} stocks, {len(insider_data)} insider, {len(pcr_data)} PCR)")

          hist_path = f'data-repo/data/history/{fetch_date_iso}.json'
          with open(hist_path,'w') as f:
              json.dump(output, f, separators=(',',':'))
          print(f"Written {hist_path}")

          # Update index.json
          all_hist = sorted([os.path.basename(f).replace('.json','')
                             for f in glob.glob('data-repo/data/history/*.json')
                             if '.gitkeep' not in f])
          with open('data-repo/data/index.json','w') as f:
              json.dump({'dates':all_hist[-30:],'lastUpdated':dt.utcnow().isoformat()+'Z',
                         'totalUploads':len(all_hist),'latestDate':fetch_date_iso,
                         'latestStockCount':stock_count,'version':'V10'}, f, indent=2)
          print(f"Updated index.json ({len(all_hist)} dates)")
          PYEOF

      - name: Commit and push to data repo
        working-directory: data-repo
        run: |
          git config user.name  "smart-money-bot"
          git config user.email "bot@mf-intelligence"
          git add -A
          git diff --cached --quiet && echo "Nothing changed" || \
            (git commit -m "data: smart money V10 $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)

      # ── #12 WEEKLY DIGEST EMAIL (every Friday at 7PM IST) ──────────
      - name: Send Weekly Digest Email
        if: |
          env.SENDGRID_API_KEY != '' &&
          (github.event.inputs.force_weekly_digest == 'true' ||
           format('{0}', github.run_id) != '' && '5' == steps.check_day.outputs.day_of_week)
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
        run: |
          python3 << 'PYEOF'
          import os, json, glob, requests
          from datetime import datetime

          # Only run on Fridays or if forced
          today = datetime.utcnow()
          is_friday = today.weekday() == 4  # 0=Mon, 4=Fri
          force = os.environ.get('INPUT_FORCE_WEEKLY_DIGEST','false').lower()=='true'
          if not is_friday and not force:
              print(f"Not Friday ({today.strftime('%A')}) and not forced — skipping digest")
              exit(0)

          api_key = os.environ.get('SENDGRID_API_KEY','')
          to_email = os.environ.get('DIGEST_EMAIL_TO','')
          from_email = os.environ.get('DIGEST_EMAIL_FROM','')
          if not api_key or not to_email:
              print("SENDGRID_API_KEY or DIGEST_EMAIL_TO not set — skipping email")
              exit(0)

          # Load latest data
          try:
              with open('data-repo/data/fno_signals.json') as f:
                  data = json.load(f)
          except:
              print("Could not load fno_signals.json")
              exit(0)

          signals = data.get('signals', {})
          bulk = data.get('bulkDeals', [])[:5]
          insider = data.get('insiderData', [])[:5]
          fii = data.get('fiiDii', {})
          date_str = data.get('meta',{}).get('latestDate','this week')

          # Build email body
          top_bulls = sorted([(s,v) for s,v in signals.items() if v.get('score',0)>=2],
                             key=lambda x:-x[1]['score'])[:5]
          top_bears = sorted([(s,v) for s,v in signals.items() if v.get('score',0)<=-2],
                             key=lambda x:x[1]['score'])[:3]

          html_body = f"""
          <html><body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;color:#1a2a3a">
          <div style="background:#05080F;padding:20px;border-radius:8px;margin-bottom:20px">
            <h1 style="color:#00E599;margin:0;font-size:1.4rem">📊 MF Intelligence Weekly Digest</h1>
            <p style="color:#5A6A82;margin:5px 0 0;font-size:.85rem">Week ending {date_str}</p>
          </div>

          <h2 style="color:#18243A;font-size:1rem;border-bottom:2px solid #00E599;padding-bottom:6px">⚡ Top Bullish Signals</h2>
          <table style="width:100%;border-collapse:collapse">
          {''.join(f'<tr><td style="padding:8px;font-weight:bold">{s}</td><td style="padding:8px;color:#0A7C59;font-family:monospace">Score: +{v["score"]}</td><td style="padding:8px;color:#666;font-size:.85rem">₹{v.get("cl",0):,.2f}</td></tr>' for s,v in top_bulls)}
          </table>

          {f'<h2 style="color:#18243A;font-size:1rem;border-bottom:2px solid #D93025;padding-bottom:6px">⚠ Bearish Signals to Watch</h2><table style="width:100%;border-collapse:collapse">{"".join(f"<tr><td style=padding:8px;font-weight:bold>{s}</td><td style=padding:8px;color:#D93025;font-family:monospace>Score: {v[score]}</td></tr>" for s,v in top_bears)}</table>' if top_bears else ''}

          <h2 style="color:#18243A;font-size:1rem;border-bottom:2px solid #4DA6FF;padding-bottom:6px">🏦 Bulk Deals This Week</h2>
          {''.join(f'<p style="margin:4px 0"><strong>{d.get("stock","")}</strong> — {d.get("client","")} {d.get("type","")} ₹{d.get("value",0):.1f} Cr</p>' for d in bulk) or '<p style="color:#666">No significant bulk deals</p>'}

          {f'<h2 style="color:#18243A;font-size:1rem;border-bottom:2px solid #FFB830;padding-bottom:6px">🔍 Insider Activity</h2>{"".join(f"<p style=margin:4px 0><strong>{d.get(stock,)}</strong> — {d.get(person,)} ({d.get(role,)}) {d.get(type,)} ₹{d.get(value,0):.1f} Cr</p>" for d in insider) or "<p style=color:#666>No insider disclosures</p>"}'  if insider else ''}

          <h2 style="color:#18243A;font-size:1rem;border-bottom:2px solid #5A6A82;padding-bottom:6px">📡 FII / DII Flow</h2>
          <p>FII: <strong style="color:{'#0A7C59' if fii.get('fii',0)>=0 else '#D93025'}">₹{abs(fii.get('fii',0)):,.0f} Cr {'Net Buy' if fii.get('fii',0)>=0 else 'Net Sell'}</strong> &nbsp;|&nbsp;
             DII: <strong style="color:#1558D6">₹{abs(fii.get('dii',0)):,.0f} Cr {'Net Buy' if fii.get('dii',0)>=0 else 'Net Sell'}</strong></p>

          <div style="background:#EEF2F7;padding:14px;border-radius:8px;margin-top:20px;font-size:.8rem;color:#60718A">
            Generated by <strong>MF Intelligence V10</strong> · Open the app for full analysis and interactive signals.
            <br><a href="https://mf-intelligence.vercel.app" style="color:#1558D6">→ Open MF Intelligence</a>
          </div>
          </body></html>
          """

          # Send via SendGrid
          resp = requests.post(
              "https://api.sendgrid.com/v3/mail/send",
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              json={
                  "personalizations": [{"to": [{"email": to_email}]}],
                  "from": {"email": from_email or "noreply@mfintelligence.app", "name": "MF Intelligence"},
                  "subject": f"📊 Smart Money Weekly Digest — {date_str}",
                  "content": [{"type": "text/html", "value": html_body}]
              }
          )
          if resp.status_code in (200, 202):
              print(f"✅ Digest email sent to {to_email}")
          else:
              print(f"❌ Email send failed: {resp.status_code} {resp.text}")
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "## Smart Money Daily Fetch V10" >> $GITHUB_STEP_SUMMARY
          echo "**Date fetched:** $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f data-repo/data/fno_signals.json ]; then
            python3 - << 'EOF'
          import json,sys
          try:
            d=json.load(open('data-repo/data/fno_signals.json'))
            m=d.get('meta',{})
            print(f"**Stocks:** {m.get('stockCount',0)}")
            print(f"**Bulk deals:** {len(d.get('bulkDeals',[]))}")
            print(f"**Insider disclosures:** {len(d.get('insiderData',[]))}")
            print(f"**PCR symbols:** {len(d.get('pcr',{}))}")
            fii=d.get('fiiDii',{})
            if fii: print(f"**FII net:** ₹{fii.get('fii',0):,.0f} Cr | **DII net:** ₹{fii.get('dii',0):,.0f} Cr")
            print("**Status:** ✅ V10 Success")
          except Exception as e:
            print(f"**Status:** ❌ Error: {e}")
          EOF
            >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ❌ fno_signals.json not written" >> $GITHUB_STEP_SUMMARY
          fi
