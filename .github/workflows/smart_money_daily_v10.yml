name: Smart Money Daily V11

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * 1-5'  # 4:00 PM IST

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Process Data
        run: |
          import csv, json, os

          def parse_bhavcopy(path):
              data = {}
              trade_date = None
              with open(path) as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      sym = row.get('TckrSymb')
                      price = row.get('UndrlygPric')
                      date = row.get('TradDt')
                      if sym and price:
                          try:
                              data[sym] = float(price)
                          except:
                              pass
                          trade_date = date
              return data, trade_date

          def parse_fovolt(path):
              data = {}
              trade_date = None
              with open(path) as f:
                  reader = csv.DictReader(f)
                  price_col = None
                  for col in reader.fieldnames:
                      if 'CLOSE' in col.upper():
                          price_col = col
                          break

                  for row in reader:
                      sym = row.get('SYMBOL') or row.get('TckrSymb')
                      if sym and price_col:
                          try:
                              data[sym] = float(row[price_col])
                          except:
                              pass
                          trade_date = row.get('DATE') or row.get('BizDt')
              return data, trade_date

          prices = {}
          trade_date = None

          files = os.listdir('.')

          bhav = [f for f in files if f.startswith('BhavCopy')]
          fovolt = [f for f in files if f.startswith('FOVOLT')]

          if bhav:
              prices, trade_date = parse_bhavcopy(bhav[0])
          elif fovolt:
              prices, trade_date = parse_fovolt(fovolt[0])

          output = {
              "meta": {
                  "date": trade_date
              },
              "prices": prices
          }

          with open('data.json','w') as f:
              json.dump(output, f)

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "update data" || echo "no changes"
          git push
