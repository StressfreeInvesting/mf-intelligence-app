name: Test FOVOLT Download (27 Mar 2026)

on:
  workflow_dispatch:

jobs:
  test-download:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Test NSE FOVOLT download
        run: |
          python3 << 'PYEOF'
          import requests, time, sys

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
          }

          # All known URL patterns for FOVOLT
          URLS = [
              "https://www1.nseindia.com/archives/nsccl/volt/FOVOLT_27032026.csv",
              "https://www1.nseindia.com/archives/nsccl/volt/FOVOLT_27032026.CSV",
              "https://nsearchives.nseindia.com/archives/nsccl/volt/FOVOLT_27032026.csv",
              "https://nsearchives.nseindia.com/content/fo/FOVOLT_27032026.csv",
              "https://nsearchives.nseindia.com/fo/FOVOLT_27032026.csv",
          ]

          session = requests.Session()
          session.headers.update(HEADERS)

          print("Trying all known URL patterns for FOVOLT_27032026.csv...\n")

          success = False
          for url in URLS:
              print(f"URL: {url}")
              try:
                  r = session.get(url, timeout=20, allow_redirects=True)
                  print(f"  HTTP {r.status_code} | size: {len(r.content):,} bytes")

                  if r.status_code == 200 and len(r.content) > 5000:
                      sample = r.content[:300].decode("utf-8", errors="ignore")
                      if "," in sample:
                          print(f"\n  ✅ VALID CSV FOUND!")
                          print(f"  First 300 chars:\n{sample}\n")
                          rows = r.content.decode("utf-8", errors="ignore").strip().split("\n")
                          print(f"  Total rows: {len(rows)}")
                          print(f"\n  ✅ SUCCESS — this URL pattern works!")
                          success = True
                          break
                      else:
                          print(f"  ⚠️  Got 200 but not CSV: {sample[:100]}")
                  else:
                      print(f"  ❌ Not usable")
              except Exception as e:
                  print(f"  ❌ Error: {e}")
              print()
              time.sleep(0.5)

          if not success:
              print("❌ None of the URLs worked.")
              print("Go to nseindia.com/all-reports-derivatives, right-click the FOVOLT")
              print("download button, copy link address and share it.")
              sys.exit(1)
          PYEOF
